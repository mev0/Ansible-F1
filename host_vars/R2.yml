---
hostname: R2

loopback_ip: 172.16.2.1
loopback_mask: 255.255.255.255

ikev2_peers:
  - name: R1
    address: 10.0.12.1

  - name: R3
    address: 10.0.23.2

tunnels:
  - id: 12
    description: "Tunnel to R1"
    local_ip: 172.20.12.2
    remote_ip: 172.20.12.1
    tunnel_source: GigabitEthernet0/1
    tunnel_destination: 10.0.12.1

  - id: 23
    description: "Tunnel to R3"
    local_ip: 172.20.23.1
    remote_ip: 172.20.23.2
    tunnel_source: GigabitEthernet0/2
    tunnel_destination: 10.0.23.2

ospf_networks:
  - network: 172.16.2.1
    wildcard: 0.0.0.0

  - network: 172.20.12.0
    wildcard: 0.0.0.3

  - network: 172.20.23.0
    wildcard: 0.0.0.3
